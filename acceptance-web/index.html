<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>目标轨迹 Evidence 预览</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/maplibre-gl@5.24.0/dist/maplibre-gl.css"
    />
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <main class="workspace">
      <header class="topbar">
        <section class="identity" aria-label="页面标题">
          <h1>目标轨迹 Evidence 预览</h1>
          <p>evidence.jsonl -> Web 清洗轨迹 / 里程 / 运动耗时</p>
        </section>
        <section class="toolbar" aria-label="导入和地图操作">
          <label class="file-button">
            导入目录
            <input id="folderInput" type="file" webkitdirectory directory multiple />
          </label>
          <label class="file-button secondary">
            选择多个 evidence.jsonl
            <input id="fileInput" type="file" multiple />
          </label>
          <button id="fitBoundsButton" type="button">适配地图</button>
          <button id="clearButton" type="button">清空</button>
        </section>
        <div id="importStatus" class="import-status" aria-live="polite">
          <span id="importSpinner" class="import-spinner" aria-hidden="true"></span>
          <span id="importText" class="import-text">等待导入 evidence.jsonl</span>
        </div>
      </header>

      <section class="layout">
        <section class="map-area" aria-label="地图预览">
          <div id="mapView" class="map-view"></div>
          <div class="map-filter-panel" aria-label="地图筛选条件">
            <label class="toggle"><input id="showRaw" type="checkbox" checked /> raw</label>
            <label class="toggle"><input id="showCleaned" type="checkbox" checked /> 清洗轨迹</label>
            <label class="toggle"><input id="showScenarios" type="checkbox" checked /> 情景区域</label>
            <label class="toggle"><input id="showTerrain" type="checkbox" checked /> 地形</label>
            <label class="toggle"><input id="showContours" type="checkbox" checked /> 等高线</label>
            <label class="toggle"><input id="showDirection" type="checkbox" checked /> 方向</label>
            <label class="toggle"><input id="showCleanedPoints" type="checkbox" /> 清洗点</label>
            <label class="toggle"><input id="showPoints" type="checkbox" /> 点</label>
            <input id="showTrusted" type="checkbox" hidden />
            <input id="showShadow" type="checkbox" hidden />
            <input id="showLowQualityCandidates" type="checkbox" hidden />
            <input id="showShadowDiffs" type="checkbox" hidden />
            <span id="shadowFilterSummary" hidden></span>
            <div id="shadowFilterOptions" class="shadow-filter-options" hidden></div>
          </div>
          <div id="contourDataPanel" class="contour-data-panel" aria-label="等高线数据">
            <strong>等高线数据</strong>
            <span id="contourDataStatus">等待地图初始化</span>
            <span id="contourDataSelected">点击等高线查看海拔</span>
          </div>
          <div class="map-legend">
            <span><i class="line raw"></i>raw 轨迹</span>
            <span><i class="line cleaned"></i>算法清洗轨迹</span>
            <span><i class="polygon scenario"></i>情景触发区域</span>
            <span><i class="terrain-swatch"></i>地形阴影</span>
            <span><i class="contour-swatch"></i>等高线</span>
            <span><i class="direction-arrow">▲</i>方向</span>
            <span><i class="dot cleaned"></i>清洗点</span>
            <span><i class="dot weak"></i>weak</span>
            <span><i class="dot reject"></i>reject/intake</span>
            <span><i class="dot raw"></i>未解释 raw</span>
          </div>
        </section>

        <aside class="right-panel" aria-label="点详情面板">
          <section class="panel">
            <div class="panel-title">
              <h2>策略说明</h2>
              <span>固定默认</span>
            </div>
            <div id="cleaningAlgorithm" class="summary-list algorithm-list"></div>
          </section>

          <section class="panel">
            <div class="panel-title">
              <h2>区间复核</h2>
              <span id="scenarioRangeState">-</span>
            </div>
            <div class="scenario-review-controls">
              <label>清洗点范围<input id="scenarioRangeInput" type="text" placeholder="1836-1919" /></label>
              <button id="scenarioRangeReviewButton" type="button">复核</button>
            </div>
            <div id="scenarioRangeReview" class="summary-list scenario-review-results"></div>
          </section>

          <section class="panel details-panel">
            <div class="panel-title">
              <h2>点详情</h2>
              <span id="selectedPointText">-</span>
            </div>
            <div id="pointDetails" class="point-details">
              <p class="empty-note">点击地图点查看 raw 证据或 Web 清洗点详情</p>
            </div>
          </section>
        </aside>
      </section>
    </main>

    <dialog id="algorithmDialog" class="algorithm-dialog" aria-labelledby="algorithmDialogTitle">
      <div class="algorithm-dialog-header">
        <h2 id="algorithmDialogTitle">清洗算法说明</h2>
        <button id="closeAlgorithmDialogButton" class="icon-button" type="button" aria-label="关闭">×</button>
      </div>
      <div id="algorithmDialogContent" class="algorithm-dialog-content"></div>
    </dialog>

    <script src="https://unpkg.com/maplibre-gl@5.24.0/dist/maplibre-gl.js"></script>
    <script src="https://unpkg.com/maplibre-contour@0.1.0/dist/index.min.js"></script>
    <script type="module" src="./src/main.mjs"></script>
  </body>
</html>
