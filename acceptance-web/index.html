<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>目标轨迹 Evidence 预览</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css"
    />
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <main class="workspace">
      <header class="topbar">
        <section class="identity" aria-label="页面标题">
          <h1>目标轨迹 Evidence 预览</h1>
          <p>evidence.jsonl -> Web 清洗轨迹 / 里程 / 运动耗时</p>
        </section>
        <section class="toolbar" aria-label="导入和地图操作">
          <label class="file-button">
            导入目录
            <input id="folderInput" type="file" webkitdirectory directory multiple />
          </label>
          <label class="file-button secondary">
            选择多个 evidence.jsonl
            <input id="fileInput" type="file" multiple />
          </label>
          <button id="fitBoundsButton" type="button">适配地图</button>
          <button id="clearButton" type="button">清空</button>
        </section>
        <div id="importStatus" class="import-status" aria-live="polite">
          <span id="importSpinner" class="import-spinner" aria-hidden="true"></span>
          <span id="importText" class="import-text">等待导入 evidence.jsonl</span>
        </div>
      </header>

      <section class="layout">
        <section class="map-area" aria-label="地图预览">
          <div id="mapView" class="map-view"></div>
          <div class="map-filter-panel" aria-label="地图筛选条件">
            <label class="toggle"><input id="showRaw" type="checkbox" checked /> raw</label>
            <label class="toggle"><input id="showTrusted" type="checkbox" checked /> 可信</label>
            <label class="toggle"><input id="showCleaned" type="checkbox" checked /> 清洗轨迹</label>
            <label class="toggle"><input id="showShadow" type="checkbox" checked /> 影子轨迹</label>
            <label class="toggle"><input id="showDirection" type="checkbox" checked /> 方向</label>
            <label class="toggle"><input id="showLowQualityCandidates" type="checkbox" checked /> 低质候选</label>
            <label class="toggle"><input id="showShadowDiffs" type="checkbox" checked /> 分歧</label>
            <label class="toggle"><input id="showCleanedPoints" type="checkbox" checked /> 清洗点</label>
            <label class="toggle"><input id="showPoints" type="checkbox" checked /> 点</label>
          </div>
          <div class="map-legend">
            <span><i class="line raw"></i>raw 轨迹</span>
            <span><i class="line trusted"></i>可信轨迹</span>
            <span><i class="line cleaned"></i>算法清洗轨迹</span>
            <span><i class="line shadow"></i>影子轨迹</span>
            <span><i class="line low-quality"></i>低质候选</span>
            <span><i class="direction-arrow">▲</i>方向</span>
            <span><i class="dot cleaned"></i>清洗点</span>
            <span><i class="dot trusted"></i>anchor/accept</span>
            <span><i class="dot weak"></i>weak</span>
            <span><i class="dot reject"></i>reject/intake</span>
            <span><i class="dot shadow-promoted"></i>可能救回</span>
            <span><i class="dot shadow-demoted"></i>可能降级</span>
            <span><i class="dot shadow-reason"></i>原因变化</span>
            <span><i class="dot raw"></i>未解释 raw</span>
          </div>
        </section>

        <aside class="right-panel" aria-label="点详情面板">
          <section class="panel">
            <div class="panel-title">
              <h2>清洗参数</h2>
              <span id="configStateText">默认</span>
            </div>
            <div class="config-grid">
              <label>弱点云 accuracy<input id="weakCloudAccuracyMeters" type="number" min="1" step="1" /></label>
              <label>GAP 秒数<input id="gapSeconds" type="number" min="1" step="1" /></label>
              <label>静止基础距离<input id="stationaryDistanceMeters" type="number" min="0.1" step="0.1" /></label>
              <details class="advanced-config">
                <summary>高级</summary>
                <div class="advanced-config-grid">
	                  <label>accuracy 上限<input id="maxIntakeAccuracyMeters" type="number" min="1" step="1" /></label>
	                  <label class="config-toggle"><input id="barometerCleaningEnabled" type="checkbox" /> 气压阻止静止整段压缩</label>
	                  <label class="config-toggle"><input id="lowQualityMotionRebuildEnabled" type="checkbox" /> 低质量重建进入轨迹</label>
	                </div>
              </details>
              <button id="applyConfigButton" type="button">应用参数</button>
              <button id="resetConfigButton" type="button">恢复默认</button>
            </div>
            <div id="cleaningAlgorithm" class="summary-list algorithm-list"></div>
          </section>

          <section class="panel details-panel">
            <div class="panel-title">
              <h2>点详情</h2>
              <span id="selectedPointText">-</span>
            </div>
            <div id="pointDetails" class="point-details">
              <p class="empty-note">点击地图点查看 raw 证据或 Web 清洗点详情</p>
            </div>
          </section>
        </aside>
      </section>
    </main>

    <dialog id="algorithmDialog" class="algorithm-dialog" aria-labelledby="algorithmDialogTitle">
      <div class="algorithm-dialog-header">
        <h2 id="algorithmDialogTitle">清洗算法说明</h2>
        <button id="closeAlgorithmDialogButton" class="icon-button" type="button" aria-label="关闭">×</button>
      </div>
      <div id="algorithmDialogContent" class="algorithm-dialog-content"></div>
    </dialog>

    <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
    <script type="module" src="./src/main.mjs"></script>
  </body>
</html>
